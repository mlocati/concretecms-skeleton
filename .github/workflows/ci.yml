name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main
    tags-ignore:
      - "**"
  workflow_dispatch:

jobs:
  check-php-syntax:
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "7.3"
          - "8.5"
    name: Check PHP ${{ matrix.php-version }} Syntax
    runs-on: ubuntu-latest
    steps:
      -
        name: Install PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: opcache
          coverage: none
          tools: none
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Check syntax
        uses: mlocati/check-php-syntax@v1
        with:
          fail-on-warnings: true

  check-composer-json:
    name: Check composer.json
    runs-on: ubuntu-latest
    steps:
      -
        name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Check composer.json
        run: composer --ansi --no-interaction validate --strict

  test-install:
    name: Test install
    runs-on: ubuntu-latest
    needs:
      - check-php-syntax
      - check-composer-json
    steps:
      -
        name: Configure MySQL client
        run: |
          cat > ~/.my.cnf <<EOF
          [client]
          user=root
          password=root
          EOF
          chmod 600 ~/.my.cnf
      -
        name: Start MySQL
        run: sudo systemctl start mysql.service
      -
        name: Create database
        run: mysql -e 'CREATE DATABASE ccm;'
      -
        name: Create database user
        run: mysql -e "CREATE USER 'ccm_db_user'@'localhost' IDENTIFIED WITH mysql_native_password BY 'ccm_db_pwd';"
      -
        name: Grant privileges
        run: mysql -e "GRANT ALL PRIVILEGES ON ccm.* TO 'ccm_db_user'@'localhost';"
      -
        name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.3'
          coverage: none
          tools: composer
          extensions: curl,fileinfo,gd,intl,mbstring,openssl,pdo_mysql
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Install dependencies
        run: composer --ansi --no-interaction install --prefer-dist --optimize-autoloader
      -
        name: Install ConcreteCMS
        run: >
          ./web/concrete/bin/concrete --ansi --no-interaction
          c5:install
          --db-server=127.0.0.1
          --db-username=ccm_db_user
          --db-password=ccm_db_pwd
          --db-database=ccm
          --timezone=UTC
          --site='Test ConcreteCMS Website'
          --canonical-url=http://localhost:8080/
          --starting-point=atomik_blank
          --session-handler=file
          --admin-email=admin@example.com
          --admin-password=12345
          --language=en_US
          --site-locale=en_US
          --disable-marketplace-connect
      -
        name: Start web server
        working-directory: web
        id: start-web-server
        run: |
          php -S 0.0.0.0:8080 &
          pid=$!
          sleep 2
          if ! kill -0 $pid 2>/dev/null; then
            echo 'Failed to start web server'
            exit 1
          fi
          echo "pid=$pid" >>$GITHUB_OUTPUT
      -
        name: Test homepage
        run: |
          if ! homepage="$(curl -sSf -o- http://localhost:8080/)"; then
            echo 'Failed to access homepage'
            exit 1
          fi
          if ! printf '%s' "$homepage" | grep -q 'Test ConcreteCMS Website'; then
            echo 'Homepage content is incorrect'
            exit 1
          fi
          echo '::group::Homepage content'
          printf '%s\n' "$homepage"
          echo '::endgroup::'
      -
        name: Stop web server
        if: always() && steps.start-web-server.outputs.pid
        run: kill ${{ steps.start-web-server.outputs.pid }} 2>/dev/null || true
